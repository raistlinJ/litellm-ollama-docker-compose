name: litellm-ollama-proxy-selfsigned

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: 24h
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 30s

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_started
    command: ["--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-change-this-key}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 20s

  certgen:
    image: alpine:3.21
    restart: "no"
    environment:
      SELF_SIGNED_CERT_CN: ${SELF_SIGNED_CERT_CN:-host.example.com}
      SELF_SIGNED_CERT_SAN: ${SELF_SIGNED_CERT_SAN:-DNS:host.example.com,DNS:localhost,IP:127.0.0.1}
      SELF_SIGNED_CERT_DAYS: ${SELF_SIGNED_CERT_DAYS:-825}
    command:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache openssl
        mkdir -p /certs
        if [ -f /certs/server.crt ] && [ -f /certs/server.key ]; then
          echo "Self-signed certificate already exists; skipping generation."
          exit 0
        fi
        cat <<EOF >/tmp/openssl.cnf
        [req]
        default_bits = 4096
        prompt = no
        default_md = sha256
        x509_extensions = v3_req
        distinguished_name = dn

        [dn]
        CN = $${SELF_SIGNED_CERT_CN}

        [v3_req]
        subjectAltName = $${SELF_SIGNED_CERT_SAN}
        keyUsage = digitalSignature, keyEncipherment
        extendedKeyUsage = serverAuth
        EOF
        openssl req -x509 -nodes -newkey rsa:4096 \
          -days "$${SELF_SIGNED_CERT_DAYS}" \
          -keyout /certs/server.key \
          -out /certs/server.crt \
          -config /tmp/openssl.cnf
    volumes:
      - ./certs:/certs

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_started
      certgen:
        condition: service_completed_successfully
    environment:
      SELF_SIGNED_CERT_CN: ${SELF_SIGNED_CERT_CN:-host.example.com}
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile.selfsigned:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - backend

networks:
  backend:

volumes:
  ollama_data:
  caddy_data:
  caddy_config:
