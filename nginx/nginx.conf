worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 4096;
  client_max_body_size 20m;
  absolute_redirect off;


  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  # Removed static upstream to prevent DNS resolution crash on startup

  server {
    listen 80;
    listen [::]:80;
    server_name _;

    return 301 https://$http_host$request_uri;
  }

  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /certs/server.crt;
    ssl_certificate_key /certs/server.key;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    location = / {
      return 302 /ui/;
    }

    location = /ui {
      return 302 /ui/;
    }

    location = /ui/login {
      return 302 /ui/login/;
    }

    location / {
      # Use Docker's built-in DNS to dynamically resolve the upstream, 
      # preventing Nginx from crashing if the backend isn't up yet.
      resolver 127.0.0.11 valid=10s;
      set $litellm_backend http://litellm:4000;

      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Forwarded-Host $http_host;
      proxy_set_header X-Forwarded-Proto https;
      set $forwarded_port $server_port;
      if ($http_host ~ ":(\d+)$") {
        set $forwarded_port $1;
      }
      proxy_set_header X-Forwarded-Port $forwarded_port;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      proxy_pass $litellm_backend;
    }
  }
}